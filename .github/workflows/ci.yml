name: SportIQ Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly at 02:00 UTC — runs full suite including eval tests
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub UI

env:
  SPORTIQ_API_URL: https://sportiq-voxv.onrender.com
  SPORTIQ_UI_URL: https://sport-iq-git-main-shwetas-projects-fd91a33a.vercel.app

jobs:

  # ── Job 1: Contract tests — runs on every PR, no API key needed ─────────────
  contract:
    name: API Contract Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Wake up SportIQ API (Render free tier cold start)
        run: |
          echo "Pinging API to wake Render instance..."
          curl -s --max-time 60 --retry 5 --retry-delay 10 --retry-connrefused \
            -X POST "$SPORTIQ_API_URL/api/analyse/stream" \
            -H "Content-Type: application/json" \
            -d '{"question":"ping","sport":"football"}' \
            -o /dev/null -w "HTTP %{http_code}" || true

      - name: Run contract tests
        run: pytest tests/api/test_contract.py -v --tb=short

  # ── Job 2: Security tests — runs on every PR ────────────────────────────────
  security:
    name: Security & Prompt Injection Tests
    runs-on: ubuntu-latest
    needs: contract

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run security tests (input + output filtering)
        run: pytest tests/api/test_security.py -v --tb=short

      - name: Run prompt injection tests (high severity only on PR)
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            pytest tests/api/test_prompt_injection.py -v --tb=short
          else
            pytest tests/api/test_prompt_injection.py -v --tb=short -k "High or Benign"
          fi

  # ── Job 3: Eval tests — runs nightly only (LLM costs money) ─────────────────
  eval:
    name: AI Quality & Hallucination Eval
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache HuggingFace models (sentence-transformers for RAGAS)
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ runner.os }}

      - name: Run hallucination tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pytest tests/eval/test_hallucination.py -v --tb=short

      - name: Run AI quality tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pytest tests/eval/test_ai_quality.py -v --tb=short
        continue-on-error: true

      - name: Run RAG eval tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pytest tests/eval/test_rag_deepeval.py tests/eval/test_rag_ragas.py -v --tb=short
        continue-on-error: true
