[pytest]
testpaths = tests
pythonpath = .
addopts = -v -s --tb=short

markers =
    contract:    API contract and schema tests (fast, no LLM calls)
    security:    Prompt injection, jailbreak and input validation tests
    hallucination: Hallucination detection tests
    ai_quality:  AI response quality tests using deepeval GEval
    rag_proof:   Fictional player tests that prove RAG retrieval is working
    rag_deepeval: Per-analyst RAG metrics using deepeval
    rag_ragas:   Dataset-level RAG pipeline benchmarking using RAGAS
